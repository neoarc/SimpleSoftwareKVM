[network]
# 세컨드 PC의 IP 주소 (필수 변경!)
second_pc_ip = 192.168.0.2
port = 9999
reconnect_sec = 3

[layout]
# 세컨드 PC 방향: left | right | top | bottom
second_pc_position = left
# 화면 끝 감지 범위 (픽셀)
edge_threshold = 8

[features]
clipboard_sync = true
# 마우스를 빠르게 움직일 때 중간 패킷 버리기 (ON: 부드러움, OFF: 정확함)
mouse_skip_packets = false
# 클라이언트 측 마우스 보간 이동 (ON: 부드러움, OFF: 즉시 이동)
smooth_move = true
# 보간 스텝 간격 ms (낮을수록 부드럽고 CPU 사용 증가, 권장: 4~8)
smooth_interval_ms = 4.0
# 보간 스텝 수 (낮을수록 빠르고 높을수록 부드러움, 권장: 3~6)
smooth_steps = 4


[log]
# 전환/연결 등 주요 이벤트만 출력
verbose = false
# 마우스 이동 좌표 로그 (verbose=true일 때만 적용)
log_mouse_move = false
# 1초당 송신 패킷 수 출력 (세컨드 제어 중일 때만)
log_packet_rate = true
